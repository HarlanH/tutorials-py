<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chinook SQL Chat</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f0f2f5;
      display: flex;
      flex-direction: column;
      height: 100vh;
      color: #1a1a1a;
    }

    header {
      background: #1a1a2e;
      color: #fff;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }
    header h1 { font-size: 1rem; font-weight: 600; letter-spacing: 0.02em; }
    header span { font-size: 0.75rem; opacity: 0.5; }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .bubble-row {
      display: flex;
      gap: 10px;
    }
    .bubble-row.user { flex-direction: row-reverse; }

    .avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.8rem;
      font-weight: 700;
      flex-shrink: 0;
    }
    .bubble-row.user .avatar  { background: #4f46e5; color: #fff; }
    .bubble-row.agent .avatar { background: #e0e7ff; color: #4f46e5; }

    .bubble-content { max-width: 72%; display: flex; flex-direction: column; gap: 6px; }

    .bubble {
      padding: 10px 14px;
      border-radius: 16px;
      line-height: 1.55;
      font-size: 0.9rem;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .bubble-row.user  .bubble { background: #4f46e5; color: #fff; border-bottom-right-radius: 4px; }
    .bubble-row.agent .bubble { background: #fff; border-bottom-left-radius: 4px; box-shadow: 0 1px 3px rgba(0,0,0,.08); }

    .rephrased {
      font-size: 0.75rem;
      color: #6b7280;
      padding-left: 2px;
    }

    details.sql-block {
      font-size: 0.78rem;
    }
    details.sql-block summary {
      cursor: pointer;
      color: #6b7280;
      user-select: none;
      padding: 2px 0;
    }
    details.sql-block summary:hover { color: #4f46e5; }
    details.sql-block pre {
      margin-top: 6px;
      background: #1e1e2e;
      color: #cdd6f4;
      padding: 10px 14px;
      border-radius: 8px;
      overflow-x: auto;
      line-height: 1.5;
      font-family: "JetBrains Mono", "Fira Code", Consolas, monospace;
      font-size: 0.8rem;
    }

    #suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 0 16px 16px 58px;
    }
    .suggestion {
      background: #fff;
      border: 1.5px solid #e0e7ff;
      color: #4f46e5;
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 0.8rem;
      cursor: pointer;
      transition: background .15s, border-color .15s;
      font-family: inherit;
    }
    .suggestion:hover { background: #e0e7ff; border-color: #a5b4fc; }

    .thinking {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 10px 14px;
      background: #fff;
      border-radius: 16px;
      border-bottom-left-radius: 4px;
      box-shadow: 0 1px 3px rgba(0,0,0,.08);
      font-size: 0.85rem;
      color: #9ca3af;
    }
    .dot { width: 6px; height: 6px; border-radius: 50%; background: #9ca3af; animation: blink 1.2s infinite; }
    .dot:nth-child(2) { animation-delay: .2s; }
    .dot:nth-child(3) { animation-delay: .4s; }
    @keyframes blink { 0%,80%,100% { opacity:.2 } 40% { opacity:1 } }

    #input-area {
      padding: 16px;
      background: #fff;
      border-top: 1px solid #e5e7eb;
      display: flex;
      gap: 10px;
      flex-shrink: 0;
    }
    #input {
      flex: 1;
      padding: 10px 14px;
      border: 1.5px solid #d1d5db;
      border-radius: 24px;
      font-size: 0.9rem;
      outline: none;
      transition: border-color .15s;
      font-family: inherit;
      resize: none;
      max-height: 120px;
      line-height: 1.4;
    }
    #input:focus { border-color: #4f46e5; }
    #send {
      padding: 0 20px;
      background: #4f46e5;
      color: #fff;
      border: none;
      border-radius: 24px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s;
      white-space: nowrap;
    }
    #send:hover  { background: #4338ca; }
    #send:disabled { background: #a5b4fc; cursor: default; }
  </style>
</head>
<body>

<header>
  <div>
    <h1>Chinook SQL Chat</h1>
    <span>Powered by opensymbolicai · qwen2.5-coder:7b</span>
  </div>
</header>

<div id="messages">
  <div class="bubble-row agent">
    <div class="avatar">AI</div>
    <div class="bubble-content">
      <div class="bubble">Hi! Ask me anything about the Chinook music store — artists, albums, sales, customers, and more.</div>
    </div>
  </div>
</div>

<div id="suggestions">
  <button class="suggestion">Top 5 artists by total sales</button>
  <button class="suggestion">Which genres have the most tracks?</button>
  <button class="suggestion">Top 3 countries by revenue</button>
  <button class="suggestion">Best-selling albums</button>
  <button class="suggestion">Which employee supports the most customers?</button>
</div>

<div id="input-area">
  <textarea id="input" rows="1" placeholder="Ask a question…"></textarea>
  <button id="send">Send</button>
</div>

<script>
  const messagesEl = document.getElementById('messages');
  const inputEl    = document.getElementById('input');
  const sendBtn    = document.getElementById('send');

  // Keep the last N turns for follow-up rephrasing
  const history = [];

  function scrollBottom() {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function addBubble(role, text, { sql, rephrased } = {}) {
    const row = document.createElement('div');
    row.className = `bubble-row ${role}`;

    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = role === 'user' ? 'You' : 'AI';

    const content = document.createElement('div');
    content.className = 'bubble-content';

    if (rephrased) {
      const r = document.createElement('div');
      r.className = 'rephrased';
      r.textContent = `↳ Rephrased as: "${rephrased}"`;
      content.appendChild(r);
    }

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = text;
    content.appendChild(bubble);

    if (sql) {
      const details = document.createElement('details');
      details.className = 'sql-block';
      const summary = document.createElement('summary');
      summary.textContent = 'View SQL';
      const pre = document.createElement('pre');
      pre.textContent = sql;
      details.appendChild(summary);
      details.appendChild(pre);
      content.appendChild(details);
    }

    row.appendChild(avatar);
    row.appendChild(content);
    messagesEl.appendChild(row);
    scrollBottom();
    return row;
  }

  function addThinking() {
    const row = document.createElement('div');
    row.className = 'bubble-row agent';

    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = 'AI';

    const bubble = document.createElement('div');
    bubble.className = 'thinking';
    bubble.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';

    row.appendChild(avatar);
    row.appendChild(bubble);
    messagesEl.appendChild(row);
    scrollBottom();
    return row;
  }

  async function send() {
    const message = inputEl.value.trim();
    if (!message) return;

    inputEl.value = '';
    inputEl.style.height = 'auto';
    sendBtn.disabled = true;

    suggestionsEl.style.display = 'none';
    addBubble('user', message);
    history.push({ role: 'user', content: message });

    const thinking = addThinking();

    try {
      const res = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message, history: history.slice(0, -1) }),
      });
      const data = await res.json();
      thinking.remove();
      addBubble('agent', data.answer, { sql: data.sql, rephrased: data.rephrased });
      history.push({ role: 'assistant', content: data.answer });
    } catch (err) {
      thinking.remove();
      addBubble('agent', 'Something went wrong. Is the server running?');
    }

    sendBtn.disabled = false;
    inputEl.focus();
  }

  const suggestionsEl = document.getElementById('suggestions');

  document.querySelectorAll('.suggestion').forEach(btn => {
    btn.addEventListener('click', () => {
      inputEl.value = btn.textContent.trim();
      inputEl.dispatchEvent(new Event('input'));
      send();
    });
  });

  sendBtn.addEventListener('click', send);
  inputEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
  });

  // Auto-resize textarea
  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = inputEl.scrollHeight + 'px';
  });
</script>

</body>
</html>
